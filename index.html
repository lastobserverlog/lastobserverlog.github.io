<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>堀川終記</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Zen Old Mincho",serif;
    min-height:100vh;
    overflow-x:hidden;

    background:
        radial-gradient(
            circle at center,
            rgba(20,16,15,.75) 0%,
            #000 82%
        );

    background-color:#050404;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    padding:80px 24px;

    animation:breathe 10s ease-in-out infinite;
}

@keyframes breathe{
    0%{filter:brightness(.82) contrast(1.12);}
    50%{filter:brightness(.96) contrast(1.38);}
    100%{filter:brightness(.84) contrast(1.18);}
}

/* 粒子 */

body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:70;

    background-image:
        radial-gradient(
            rgba(255,255,255,.012) 1px,
            transparent 1px
        );

    background-size:15px 15px;
    opacity:.45;
}

/* 干渉ノイズ */

body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:60;

    background:
        repeating-linear-gradient(
            0deg,
            rgba(255,255,255,.015),
            rgba(255,255,255,.015) 1px,
            transparent 3px,
            transparent 5px
        );

    mix-blend-mode:overlay;
    animation:scan .08s linear infinite;
}

@keyframes scan{
    from{transform:translateY(0)}
    to{transform:translateY(8px)}
}

/* 屈折 */

.refraction{
    position:fixed;
    inset:-20%;
    pointer-events:none;
    z-index:20;

    background:
        radial-gradient(
            ellipse at 20% 30%,
            rgba(255,255,255,.02),
            transparent 40%
        ),
        radial-gradient(
            ellipse at 70% 60%,
            rgba(120,0,0,.04),
            transparent 45%
        ),
        radial-gradient(
            ellipse at 50% 80%,
            rgba(255,255,255,.015),
            transparent 35%
        );

    mix-blend-mode:screen;

    filter:
        blur(38px)
        contrast(1.2);

    animation:
        refract 18s ease-in-out infinite alternate;
}

@keyframes refract{
    0%{
        transform:translate(-1%,0) scale(1) rotate(.2deg);
    }
    50%{
        transform:translate(1%,-1%) scale(1.03) rotate(-.2deg);
    }
    100%{
        transform:translate(-1%,1%) scale(1.01) rotate(.15deg);
    }
}

/* 魂 */

.cursor-soul{
    position:fixed;
    top:0;
    left:0;

    width:320px;
    height:320px;

    border-radius:50%;
    pointer-events:none;
    z-index:30;

    background:
        radial-gradient(
            circle,
            rgba(120,10,10,.14) 0%,
            rgba(70,0,0,.08) 22%,
            rgba(25,0,0,.04) 48%,
            transparent 72%
        );

    mix-blend-mode:screen;

    filter:
        blur(42px)
        brightness(.65)
        contrast(1.1);

    opacity:.72;
    transform:translate(-50%,-50%);

    animation:bloodPulse 7s ease-in-out infinite;
}

/* ガラス */

.glass-wrap{
    width:min(760px,92vw);
    position:relative;
    z-index:40;

    overflow:hidden;
    border-radius:28px;

    background:rgba(18,14,14,.14);

    border:
        1px solid rgba(255,255,255,.06);

    box-shadow:
        0 12px 40px rgba(0,0,0,.55),
        inset 0 0 1px rgba(255,255,255,.12);

    backdrop-filter:
        blur(18px)
        brightness(.92);

    -webkit-backdrop-filter:
        blur(18px)
        brightness(.92);

    transform-style:preserve-3d;
    transition:transform .22s ease;

    animation:
        waterDrift 10s ease-in-out infinite;
}

.glass-blur{
    position:absolute;
    inset:0;
    z-index:1;
    backdrop-filter:blur(30px);
    opacity:.8;
}

.glass-shine{
    position:absolute;
    inset:0;
    z-index:2;
    pointer-events:none;

    background:
        radial-gradient(
            circle at var(--mx,50%) var(--my,50%),
            rgba(255,255,255,.18) 0%,
            rgba(255,255,255,.06) 14%,
            rgba(255,255,255,.02) 28%,
            transparent 46%
        );

    mix-blend-mode:screen;
}

.glass-noise{
    position:absolute;
    inset:0;
    z-index:3;
    pointer-events:none;

    opacity:.03;

    background-image:
        radial-gradient(
            rgba(255,255,255,.4) .5px,
            transparent .5px
        );

    background-size:7px 7px;
    mix-blend-mode:overlay;
}

@keyframes waterDrift{
    0%{
        transform:translateY(0) skewX(0);
    }
    50%{
        transform:translateY(-2px) skewX(.18deg);
    }
    100%{
        transform:translateY(0) skewX(0);
    }
}

.glass{
    position:relative;
    z-index:4;
    padding:40px 20px;
}

/* 記憶 */

.memory{
    opacity:.12;
    transform:translateY(40px);

    transition:
        opacity 1.8s ease,
        transform 1.8s ease;
}

.memory.visible{
    opacity:1;
    transform:translateY(0);
}

/* 本文 */

.record{
    white-space:pre-wrap;
    word-break:break-word;

    font-size:18px;
    line-height:2.7;
    letter-spacing:.08em;
    font-weight:600;

    color:rgba(210,205,198,.58);

    text-shadow:
        0 0 7px rgba(255,255,255,.14),
        0 0 18px rgba(160,0,0,.38);
}

/* 文字 */

.char{
    opacity:0;
    display:inline;
    filter:blur(10px);

    transition:
        color .25s ease,
        filter .25s ease,
        text-shadow .25s ease;

    animation:
        rise .9s ease forwards;
}

@keyframes rise{
    0%{
        opacity:0;
        filter:blur(10px);

        text-shadow:
            0 0 20px rgba(255,120,80,.75);
    }

    55%{
        opacity:.82;
        filter:blur(2px);
    }

    100%{
        opacity:1;
        filter:blur(0);

        text-shadow:
            0 0 6px rgba(255,255,255,.12),
            0 0 18px rgba(150,0,0,.35);
    }
}

.char.lit{
    color:rgba(225,212,205,.78);

    filter:blur(.15px);

    text-shadow:
        0 0 6px rgba(120,20,20,.18),
        0 0 18px rgba(90,0,0,.32);
}

.signature{
    display:block;
    text-align:right;
    margin-top:60px;
    color:rgba(120,20,15,.65);
    opacity:0;
    transition:2s;
}

.post-list{
    margin-top:60px;
    padding-top:30px;
    border-top:1px solid rgba(139,0,0,.14);
    list-style:none;
    text-align:center;
}

.post-list a{
    color:rgba(139,0,0,.5);
    text-decoration:none;
    transition:.5s;
}

.post-list a:hover{
    color:rgba(255,255,255,.8);

    text-shadow:
        0 0 12px rgba(255,255,255,.35);
}

@media(max-width:768px){

    body{
        padding:40px 16px;
    }

    .record{
        font-size:15px;
        line-height:2.4;
    }

    .cursor-soul{
        width:240px;
        height:240px;
    }
}

@keyframes bloodPulse{
    0%{
        transform:translate(-50%,-50%) scale(.95);
        opacity:.58;
    }
    45%{opacity:.72;}
    55%{
        transform:translate(-50%,-50%) scale(1.04);
        opacity:.9;
    }
    100%{
        transform:translate(-50%,-50%) scale(.96);
        opacity:.62;
    }
}
</style>
</head>

<body>

<div class="refraction"></div>
<div class="cursor-soul" id="soul"></div>

<div class="glass-wrap" id="glass">
    <div class="glass-blur"></div>
    <div class="glass-shine"></div>
    <div class="glass-noise"></div>

    <div class="glass">
        <pre class="record memory" id="recordText">
（本文はそのまま貼り付けてください）
<span class="signature" id="sig">— 佐伯 忠之 記</span>
</pre>
    </div>

    <ul class="post-list">
        <li><a href="posts/first-post.md"></a></li>
    </ul>
</div>

<script>

/* 光追従 */

const soul=document.getElementById("soul");
let mx=window.innerWidth/2;
let my=window.innerHeight/2;
let x=mx;
let y=my;

document.addEventListener("mousemove",(e)=>{
    mx=e.clientX;
    my=e.clientY;
});

function soulLoop(){
    x+=(mx-x)*0.065;
    y+=(my-y)*0.065;

    soul.style.transform=
    `translate(${x}px,${y}px) translate(-50%,-50%)`;

    requestAnimationFrame(soulLoop);
}
soulLoop();

/* glass追従 */

const glass=document.getElementById("glass");

glass.addEventListener("mousemove",e=>{

    const rect=glass.getBoundingClientRect();

    const gx=e.clientX-rect.left;
    const gy=e.clientY-rect.top;

    const mxp=gx/rect.width*100;
    const myp=gy/rect.height*100;

    glass.style.setProperty("--mx",mxp+"%");
    glass.style.setProperty("--my",myp+"%");

    const ry=(mxp-50)/12;
    const rx=-(myp-50)/12;

    glass.style.transform=
    `rotateY(${ry}deg) rotateX(${rx}deg)`;
});

glass.addEventListener("mouseleave",()=>{
    glass.style.transform="rotateX(0) rotateY(0)";
});

</script>
</body>
</html>
