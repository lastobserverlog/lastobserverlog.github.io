<h1>LAST OBSERVATION</h1>

<pre>
私は特別な人間ではない。

学者でもないし、資産家でもない。
組織にも属していない。
スポンサーもいない。
あるのは、古いPCと、積み上がったブラウザ履歴と、説明のつかない違和感だけだ。

もし君がここへ偶然辿り着いたなら、まず先に言っておく。

このページは証明ではない。
告発でもない。
誰かを扇動するためのものでもない。

ただの保存だ。

記録は、信じられるために残すのではなく、消えないように残す。
